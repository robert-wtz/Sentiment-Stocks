name: sentiment-pipeline

on:
  schedule:
    - cron: "30 22 * * 1-5"   # weekdays 22:30 UTC (after US market close)
  push:
    paths:
      - "src/**"
      - "scripts/**"
      - "requirements.txt"
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "requirements.txt"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "live"
        type: choice
        options:
          - live
          - planted
          - random

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=live" >> "$GITHUB_OUTPUT"
          else
            echo "mode=planted" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pipeline
        env:
          USE_SYNTHETIC: ${{ steps.mode.outputs.mode != 'live' && steps.mode.outputs.mode || '' }}
          STOCKTWITS_TOKEN: ${{ secrets.STOCKTWITS_TOKEN }}
        run: python -m scripts.run_pipeline

      - name: Write job summary
        run: |
          python - >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          import json, pathlib
          m = json.loads(pathlib.Path("reports/metrics.json").read_text())
          edge = m["edge"]
          edge_str = (f"+{edge:.1%}" if edge >= 0 else f"{edge:.1%}")
          print("## Sentiment Pipeline — Run Summary\n")
          print("| Metric | Value |")
          print("|--------|-------|")
          print(f"| CV Accuracy | {m['cv_accuracy']:.1%} |")
          print(f"| Baseline    | {m['cv_baseline']:.1%} |")
          print(f"| Edge        | {edge_str} |")
          print(f"| ROC AUC     | {m['cv_auc']:.3f} |")
          print(f"| Rows        | {m['rows']:,} |")
          print(f"| Tickers     | {', '.join(m['tickers'])} |")
          EOF

      - name: Commit artifacts back to repo
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/ reports/
          git diff --cached --quiet || git commit -m "chore: pipeline run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git pull --rebase
          git push

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

  deploy:
    needs: pipeline
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
